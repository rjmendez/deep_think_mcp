kind: deep-think-skill
version: 1
id: planning
task_class: planning
description: Structured implementation planning for remediation and self-improvement pipelines.
routing:
  directive_set: planning
  mandate_set: synthesis
controls:
  verification_mode: plan
  provenance_mode: explicit-assumptions
  output_contract: strict-json
  layer_order:
    - target_identity
    - current_state
    - desired_state
    - dependency_graph
    - approval_gates
    - verification_plan
    - rollback_plan
  target_policy:
    explicit_target_required: true
    inspect_current_state_first: true
    compare_current_vs_intended: true
    snapshot_before_mutation: true
  evidence_policy:
    define_predicate_first: true
    answer_highest_verified_layer_only: true
    separate_observed_inferred_assumed: true
    distinguish_candidate_from_confirmed: true
    state_remaining_gap: true
  action_policy:
    read_only_first: true
    bounded_change_only: true
    require_artifact_provenance_before_mutation: true
    stop_at_verified_boundary: true
  approval_policy:
    explicit_confirmation_for_external_mutation: true
    document_reason_for_bypass: true
  verification_tiers:
    - syntactic
    - control_plane
    - data_plane
    - end_to_end
  report_contract:
    - define the exact target and desired predicate first
    - separate preconditions, action steps, verification, and rollback
    - distinguish confirmed state from best available candidate
    - state the blocking uncertainty before any write step
  stop_conditions:
    - stop when target identity is not proven
    - stop when approval is missing for an external write
    - stop when rollback is undefined for a risky mutation
models:
  ollama:
    light: heretic-llama31-8b-instruct:latest
    medium: heretic-llama31-8b-instruct:latest
    heavy: heretic-llama31-8b-instruct:latest
  copilot:
    light: gpt-5.4
    medium: gpt-5.4
    heavy: gpt-5.5
  anthropic:
    light: claude-haiku-4-5
    medium: claude-sonnet-4-6
    heavy: claude-opus-4-7
