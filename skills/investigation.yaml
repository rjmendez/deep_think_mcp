kind: deep-think-skill
version: 1
id: investigation
task_class: investigation
description: Evidence weighing, IOC triage, incident response, and root-cause investigation.
routing:
  directive_set: investigation
  mandate_set: investigation
controls:
  verification_mode: evidence
  provenance_mode: layered
  layer_order:
    - identity
    - presence
    - reachability
    - authorization
    - readiness
    - post_action_verification
  target_policy:
    explicit_target_required: true
    inspect_current_state_first: true
    compare_current_vs_intended: true
  evidence_policy:
    define_predicate_first: true
    answer_highest_verified_layer_only: true
    separate_observed_inferred_assumed: true
    distinguish_candidate_from_confirmed: true
    state_remaining_gap: true
  action_policy:
    read_only_first: true
    bounded_change_only: true
    stop_at_verified_boundary: true
    require_artifact_provenance_before_mutation: true
  approval_policy:
    explicit_confirmation_for_external_mutation: true
  verification_tiers:
    - syntactic
    - control_plane
    - data_plane
    - end_to_end
  report_contract:
    - define the investigated predicate before claiming readiness
    - keep identity, reachability, authorization, and readiness separate
    - separate confirmed-ready from best candidate
    - state the exact missing evidence for the next layer
  stop_conditions:
    - stop after a mutation-blocking ambiguity is discovered
    - stop when the artifact provenance does not match the live target
models:
  ollama:
    light: heretic-llama31-8b-instruct:latest
    medium: heretic-llama31-8b-instruct:latest
    heavy: heretic-llama31-8b-instruct:latest
  copilot:
    light: gpt-5.4
    medium: gpt-5.4
    heavy: gpt-5.5
  anthropic:
    light: claude-haiku-4-5
    medium: claude-sonnet-4-6
    heavy: claude-opus-4-7
