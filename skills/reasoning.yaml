kind: deep-think-skill
version: 1
id: reasoning
task_class: reasoning
description: Complex multi-step logical reasoning, mathematical analysis, and constraint solving.
routing:
  directive_set: reasoning
  mandate_set: reasoning
controls:
  verification_mode: rigorous
  provenance_mode: explicit-assumptions
  layer_order:
    - predicate
    - assumptions
    - constraints
    - reasoning_chain
    - verification
    - residual_uncertainty
  target_policy:
    explicit_target_required: true
    inspect_current_state_first: true
  evidence_policy:
    define_predicate_first: true
    answer_highest_verified_layer_only: true
    separate_observed_inferred_assumed: true
    distinguish_candidate_from_confirmed: true
    state_remaining_gap: true
  action_policy:
    read_only_first: true
    stop_at_verified_boundary: true
  verification_tiers:
    - internal_consistency
    - independent_check
    - counterexample_resistance
  report_contract:
    - state the exact predicate being proven or disproven
    - expose load-bearing assumptions explicitly
    - distinguish proven conclusions from best-fit hypotheses
  stop_conditions:
    - stop when a claim depends on an unverified assumption
models:
  ollama:
    light: phi4-mini:latest
    medium: llama3.1:8b
    heavy: llama3.1:8b
  copilot:
    light: gpt-5.4
    medium: gpt-5.4
    heavy: gpt-5.5
  anthropic:
    light: claude-haiku-4-5
    medium: claude-sonnet-4-6
    heavy: claude-opus-4-7
