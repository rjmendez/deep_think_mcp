kind: deep-think-skill
version: 1
id: research
task_class: research
description: Grounded factual research with cited claims and strict separation of verified vs unverified content.
routing:
  directive_set: research
  mandate_set: synthesis
controls:
  enable_research_tools: true
  block_abliteration: true
  verification_mode: grounded
  provenance_mode: cited
  layer_order:
    - question_scope
    - source_inventory
    - claim_grounding
    - contradiction_handling
    - conclusion
    - residual_uncertainty
  target_policy:
    explicit_target_required: true
    inspect_current_state_first: true
  evidence_policy:
    define_predicate_first: true
    answer_highest_verified_layer_only: true
    separate_observed_inferred_assumed: true
    distinguish_candidate_from_confirmed: true
    state_remaining_gap: true
  action_policy:
    read_only_first: true
    stop_at_verified_boundary: true
  verification_tiers:
    - source
    - citation
    - contradiction
  report_contract:
    - cite every factual claim or mark it unverified
    - separate grounded conclusions from best current candidates
    - state the next missing source plainly
  stop_conditions:
    - stop when key claims cannot be grounded
models:
  ollama:
    light: phi4-mini:latest
    medium: qwen3.5:27b
    heavy: llama3.1:8b
  copilot:
    light: gpt-5.4
    medium: gpt-5.4
    heavy: gpt-5.5
  anthropic:
    light: claude-haiku-4-5
    medium: claude-sonnet-4-6
    heavy: claude-opus-4-7
