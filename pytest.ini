[pytest]
# Pytest configuration for ground truth tests

# Markers for selective test execution
markers =
    asyncio: mark test as async (require pytest-asyncio)
    unit: mark test as unit test (no network required)
    integration: mark test as integration test (requires external services)
    mqtt: mark test as MQTT-specific
    nova: mark test as Nova/Great Library-specific
    stress: mark test as stress/performance test (optional, may be slow)

# Asyncio mode: auto for pytest-asyncio compatibility
asyncio_mode = auto

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
