apiVersion: v1
kind: Namespace
metadata:
  name: agents
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deep-think-mcp
  namespace: agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deep-think-mcp
  template:
    metadata:
      labels:
        app: deep-think-mcp
    spec:
      containers:
      - name: deep-think-mcp
        image: deep-think-mcp:v2.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
        env:
        - name: DEEP_THINK_FORCE_LOCAL
          value: "1"
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: deep-think-mcp
  namespace: agents
spec:
  selector:
    app: deep-think-mcp
  ports:
  - port: 30852
    targetPort: 8000
    nodePort: 30852
  type: NodePort
